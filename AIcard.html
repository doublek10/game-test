<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AIludo — 3D Visual Board</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#ffd166;
      --board-width:680px;
      --board-depth:40px;
      --perspective:1100px;
    }
    html,body{
      height:100%;
      margin:0;
      background:
        linear-gradient(180deg, #071026 0%, #0b1220 100%);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:#e6eef8;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap {
      width: calc(var(--board-width) + 40px);
      max-width:95vw;
      display:flex;
      gap:18px;
      align-items:flex-start;
    }

    /* scene */
    .scene {
      width: var(--board-width);
      perspective: var(--perspective);
      perspective-origin: 50% 40%;
      user-select: none;
    }

    .camera {
      width:100%;
      transform-style:preserve-3d;
      transition: transform 300ms ease;
      transform: translateZ(-220px) rotateX(22deg) rotateY(-14deg);
    }

    /* board group — a 3d box with textured top */
    .board {
      width:100%;
      height: calc(var(--board-width));
      position:relative;
      transform-style:preserve-3d;
      margin:auto;
      display:block;
    }

      width:100%;
      height:100%;
      left:0; top:0;
      border-radius:18px;
      overflow:hidden;
      transform: translateZ(calc(var(--board-depth) / 2));

    /* board edges (thickness) */
    .board__edge {
      position:absolute;
      left:0; top:0;
      width:100%;
      height:var(--board-depth);
      transform-origin: center;
      transform: translateY(calc(100% - var(--board-depth)/2)) rotateX(90deg) translateZ(calc(var(--board-depth) / 2 * -1));
      border-radius:0 0 16px 16px;
      background: linear-gradient(180deg,#0b1220,#071026);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      opacity:0.95;
    }

    /* tokens (look like short cylinders) */
    .token {
      position:absolute;
      width:40px;
      height:40px;
      left:50%;
      top:50%;
      transform-style:preserve-3d;
      transform-origin:center;
      margin:-20px;
      transition: transform 300ms cubic-bezier(.2,.9,.2,1), box-shadow 250ms;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:grab;
      z-index:5;
    }

    .token .cap {
      width:100%;
      height:22px;
      border-radius:50% 50% 40% 40%;
      transform: translateZ(10px);
      box-shadow: 0 8px 14px rgba(2,6,23,0.55);
    }

    .token .base {
      width:80%;
      height:18px;
      border-radius:50%;
      transform: translateZ(0px) translateY(6px);
      opacity:0.95;
    }

    /* sample positions for tokens (arranged around board for demo) */
    .token.p1 { left:12%; top:12%; }
    .token.p1.t2 { left:22%; top:12%; }
    .token.p1.t3 { left:12%; top:22%; }
    .token.p1.t4 { left:22%; top:22%; }

    .token.p2 { left:78%; top:78%; }
    .token.p2.t2 { left:68%; top:78%; }
    .token.p2.t3 { left:78%; top:68%; }
    .token.p2.t4 { left:68%; top:68%; }

    /* colors */
    .token.p1 .cap { background: linear-gradient(180deg,#ff7b7b,#b23232); }
    .token.p1 .base { background: linear-gradient(180deg,#b23232,#7f1d1d); }

    .token.p2 .cap { background: linear-gradient(180deg,#7be4a6,#1a8f4f); }
    .token.p2 .base { background: linear-gradient(180deg,#1a8f4f,#0f5b2f); }

    /* simple hover pop */
    .token:active { cursor:grabbing; transform: translateZ(40px) scale(1.06); box-shadow:0 30px 80px rgba(0,0,0,0.6); }

    /* dice cube */
    .dice-wrap {
      width:200px;
      perspective:800px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
    }
    .dice {
      position:relative;
      width:110px;
      height:110px;
      transform-style:preserve-3d;
      transition: transform 900ms cubic-bezier(.2,.8,.2,1);
      cursor:pointer;
    }
    .dice .face {
      position:absolute;
      width:100%;
      height:100%;
      left:0; top:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      color:#111;
      border-radius:12px;
      box-shadow: 0 10px 20px rgba(2,6,23,0.35), inset 0 -6px 12px rgba(0,0,0,0.06);
    }
    .dice .dot {
      width:14px;
      height:14px;
      border-radius:50%;
      background:#111;
      box-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
    /* faces transform */
    .face.f1 { transform: rotateY(0deg) translateZ(55px); }
    .face.f2 { transform: rotateY(90deg) translateZ(55px); }
    .face.f3 { transform: rotateY(180deg) translateZ(55px); }
    .face.f4 { transform: rotateY(-90deg) translateZ(55px); }
    .face.f5 { transform: rotateX(90deg) translateZ(55px); }
    .face.f6 { transform: rotateX(-90deg) translateZ(55px); }

    /* dots layout for faces */
    .dots {
      width:72px; height:72px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap:10px;
      align-items:center;
      justify-items:center;
    }
    .dots .dot { width:14px; height:14px; }

    /* small UI */
    .controls {
      width:200px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      padding-top:10px;
    }
    .btn {
      padding:10px 14px;
      border-radius:10px;
      background:linear-gradient(180deg,#0f1724,#172033);
      border:1px solid rgba(255,255,255,0.04);
      color:#e6eef8;
      cursor:pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      font-size:14px;
    }
    .hint {
      font-size:13px; color:#9fb4d6; text-align:center; opacity:0.9;
    }

    /* responsive */
    @media (max-width:900px){
      .wrap { flex-direction:column; align-items:center; }
      .dice-wrap { order:2; }
      .scene { order:1; margin-bottom:18px; }
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="scene" id="scene">
      <div class="camera" id="camera">
        <div class="board" id="board">
          <div class="board__top" aria-hidden="true"></div>
          <div class="board__edge" aria-hidden="true"></div>

          <!-- tokens sample (4 token positions per player) -->
          <div class="token p1 t1" data-player="p1" data-index="0">
            <div class="cap"></div><div class="base"></div>
          </div>
          <div class="token p1 t2" data-player="p1" data-index="1">
            <div class="cap"></div><div class="base"></div>
          </div>
          <div class="token p1 t3" data-player="p1" data-index="2">
            <div class="cap"></div><div class="base"></div>
          </div>
          <div class="token p1 t4" data-player="p1" data-index="3">
            <div class="cap"></div><div class="base"></div>
          </div>

          <div class="token p2 t1" data-player="p2" data-index="0">
            <div class="cap"></div><div class="base"></div>
          </div>
          <div class="token p2 t2" data-player="p2" data-index="1">
            <div class="cap"></div><div class="base"></div>
          </div>
          <div class="token p2 t3" data-player="p2" data-index="2">
            <div class="cap"></div><div class="base"></div>
          </div>
          <div class="token p2 t4" data-player="p2" data-index="3">
            <div class="cap"></div><div class="base"></div>
          </div>

        </div>
      </div>
    </div>

    <div class="dice-wrap" aria-hidden="false">
      <div class="dice" id="dice" title="Click to roll">
        <div class="face f1"><div class="dots dots-1"></div></div>
        <div class="face f2"><div class="dots dots-2"></div></div>
        <div class="face f3"><div class="dots dots-3"></div></div>
        <div class="face f4"><div class="dots dots-4"></div></div>
        <div class="face f5"><div class="dots dots-5"></div></div>
        <div class="face f6"><div class="dots dots-6"></div></div>
      </div>

      <button class="btn" id="rollBtn">Roll Dice (visual)</button>
      <div class="hint">Drag the board to rotate • Wheel to zoom</div>
      <button class="btn" id="resetView">Reset View</button>
    </div>
  </div>

  <!-- Firebase Verify -->
<script type="module" src="https://playnexia.xyz/js-read/verify.js"></script>

<!-- Main Game Script -->
<script type="module" src="ludoAI.js"></script>

  <!-- Visual scripting for interaction -->
  <script>
    // Scene interaction: drag to rotate, wheel to zoom
    (function(){
      const camera = document.getElementById('camera');
      const scene = document.getElementById('scene');
      let isDown=false, startX=0, startY=0, rotX=22, rotY=-14, zoom=-220;

      scene.addEventListener('pointerdown', e=>{
        isDown = true;
        startX = e.clientX;
        startY = e.clientY;
        scene.setPointerCapture(e.pointerId);
      });
      window.addEventListener('pointerup', e=>{
        isDown=false;
      });
      window.addEventListener('pointermove', e=>{
        if(!isDown) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        startX = e.clientX; startY = e.clientY;
        rotX = Math.min(60, Math.max(0, rotX - dy*0.2));
        rotY = (rotY + dx*0.25);
        updateCamera();
      });

      function updateCamera(){
        camera.style.transform = `translateZ(${zoom}px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
      }

      // wheel to zoom
      scene.addEventListener('wheel', e=>{
        e.preventDefault();
        zoom += e.deltaY * 0.6;
        zoom = Math.min(-80, Math.max(-600, zoom));
        updateCamera();
      }, { passive:false });

      document.getElementById('resetView').addEventListener('click', ()=>{
        rotX = 22; rotY = -14; zoom = -220; updateCamera();
      });

      updateCamera();
    })();

    // Dice visual & roll animation
    (function(){
      const dice = document.getElementById('dice');
      const rollBtn = document.getElementById('rollBtn');

      // helper: make dot patterns for faces
      function makeDots(faceIndex, container){
        // clear
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'dots';
        for(let r=0;r<9;r++){
          const dot = document.createElement('div');
          dot.className = 'dot';
          // mapping 3x3 cells -> show pips depending on faceIndex
          const row = Math.floor(r/3), col = r%3;
          const center = (row===1 && col===1);
          const topLeft = (row===0 && col===0);
          const topRight = (row===0 && col===2);
          const bottomLeft = (row===2 && col===0);
          const bottomRight = (row===2 && col===2);

          let show = false;
          if(faceIndex === 1) show = center;
          if(faceIndex === 2) show = topLeft || bottomRight;
          if(faceIndex === 3) show = center || topLeft || bottomRight;
          if(faceIndex === 4) show = topLeft || topRight || bottomLeft || bottomRight;
          if(faceIndex === 5) show = topLeft || topRight || bottomLeft || bottomRight || center;
          if(faceIndex === 6) show = topLeft || topRight || bottomLeft || bottomRight || (row===1 && (col===0 || col===2));
          dot.style.opacity = show ? '1' : '0';
          grid.appendChild(dot);
        }
        container.appendChild(grid);
      }

      // setup faces
      const faces = dice.querySelectorAll('.face .dots');
      // ensure all faces have dots for numbers 1..6
      for(let i=0;i<6;i++){
        makeDots(i+1, dice.querySelectorAll('.face')[i].querySelector('.dots'));
      }

      // random face rotation presets to show each number on front
      const faceRotations = {
        1: 'rotateY(0deg)',
        2: 'rotateY(-90deg)',
        3: 'rotateY(-180deg)',
        4: 'rotateY(90deg)',
        5: 'rotateX(-90deg)',
        6: 'rotateX(90deg)'
      };

      // rolling animation controller
      function rollVisual(result){
        // random spin then settle on face for 'result'
        const spins = [
          'rotateX(720deg) rotateY(360deg)',
          'rotateX(540deg) rotateY(720deg)',
          'rotateX(360deg) rotateY(540deg)',
          'rotateX(720deg) rotateY(720deg)'
        ];
        const spin = spins[Math.floor(Math.random()*spins.length)];
        dice.style.transition = 'transform 900ms cubic-bezier(.2,.8,.2,1)';
        // start spin
        dice.style.transform = spin;
        // after spin, settle to the result face with small rotation offset
        setTimeout(()=>{
          const settle = faceRotations[result] + ' rotateZ(' + (Math.random()*30-15) + 'deg)';
          dice.style.transform = settle;
        }, 150);
      }

      function randomRoll(){
        return Math.floor(Math.random()*6)+1;
      }

      rollBtn.addEventListener('click', ()=>{
        const r = randomRoll();
        rollVisual(r);
      });

      dice.addEventListener('click', ()=>{
        const r = randomRoll();
        rollVisual(r);
      });

    })();

    // Make tokens draggable within scene for demo (not game logic)
    (function(){
      const tokens = document.querySelectorAll('.token');
      tokens.forEach(t=>{
        let down=false, ox=0, oy=0;
        t.addEventListener('pointerdown', e=>{
          down=true; t.setPointerCapture(e.pointerId);
          ox = e.clientX; oy = e.clientY;
          t.style.transition = 'none';
          t.style.transform += ' translateZ(40px) scale(1.04)';
        });
        window.addEventListener('pointermove', e=>{
          if(!down) return;
          const dx = e.clientX - ox; const dy = e.clientY - oy;
          // convert screen delta to relative percent positions
          const p = t.getBoundingClientRect();
          const parent = t.parentElement.getBoundingClientRect();
          const newLeft = Math.min(Math.max(0, (p.left - parent.left + dx) / parent.width * 100), 100);
          const newTop  = Math.min(Math.max(0, (p.top - parent.top + dy) / parent.height * 100), 100);
          t.style.left = newLeft + '%';
          t.style.top  = newTop + '%';
          ox = e.clientX; oy = e.clientY;
        });
        window.addEventListener('pointerup', e=>{
          if(!down) return;
          down=false;
          t.releasePointerCapture && t.releasePointerCapture();
          t.style.transition = '';
          t.style.transform = t.style.transform.replace(' translateZ(40px) scale(1.04)','');
        });
      });
    })();

  </script>
</body>
</html>
